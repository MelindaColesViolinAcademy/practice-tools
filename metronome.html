<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Melinda Coles Practice Metronome</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#F8F5EE;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
    color:#314132;
    margin-bottom:10px;
}

.subtitle{
    color:#B79C55;
    margin-bottom:30px;
}

#bpm{
    font-size:72px;
    font-weight:bold;
    color:#314132;
}

.small{
    color:#888;
    margin-bottom:30px;
}

input[type=range]{
    width:100%;
}

button{
    margin-top:30px;
    padding:16px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#AAB79B;
    color:white;
}

button:hover{
    background:#93A483;
}

.quote{
    margin-top:40px;
    font-style:italic;
    color:#777;
}

.quick{
    margin-top:25px;
}

.quick button{
    margin:4px;
    padding:10px 16px;
    font-size:16px;
}

</style>

</head>

<body>

<div class="card">

<h1>Practice Metronome</h1>

<div class="subtitle">
Melinda Coles Violin Academy
</div>

<div id="bpm">60</div>

<div class="small">Beats Per Minute</div>

<input
id="slider"
type="range"
min="40"
max="200"
value="60">

<div class="quick">

<button onclick="setTempo(40)">40</button>
<button onclick="setTempo(50)">50</button>
<button onclick="setTempo(60)">60</button>
<button onclick="setTempo(72)">72</button>
<button onclick="setTempo(80)">80</button>
<button onclick="setTempo(100)">100</button>
<button onclick="setTempo(120)">120</button>

</div>

<button id="start">
Start
</button>

<div class="quote">
Music is my magic.
</div>

</div>

<script>

let bpm=60;
let playing=false;
let timer;

const audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

const slider=document.getElementById("slider");
const bpmText=document.getElementById("bpm");

slider.oninput=function(){

bpm=this.value;
bpmText.innerHTML=bpm;

if(playing){

clearInterval(timer);
start();

}

}

function setTempo(x){

slider.value=x;
slider.oninput();

}

function click(){

audio.currentTime=0;
audio.play();

}

function start(){

timer=setInterval(click,60000/bpm);

}

document.getElementById("start").onclick=function(){

if(!playing){

playing=true;
this.innerHTML="Stop";
start();

}else{

playing=false;
this.innerHTML="Start";
clearInterval(timer);

}

}

</script>

</body>
</html>
