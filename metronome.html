<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melinda Coles Practice Metronome</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#F8F5EE;
    color:#354234;
}

.container{
    max-width:700px;
    margin:auto;
    padding:60px 25px;
    text-align:center;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    color:#8B937D;
    font-size:22px;
    margin-bottom:50px;
}

.metronome{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.bpm{
    font-size:70px;
    font-weight:bold;
    margin:20px 0;
}

input[type=range]{
    width:100%;
}

button{
    margin-top:30px;
    padding:16px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#A9B79A;
    color:white;
}

.tip{
    margin-top:35px;
    font-size:20px;
    color:#666;
}

footer{
    margin-top:60px;
    color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>🎻 Practice Metronome</h1>

<div class="subtitle">

Music is my magic.

</div>

<div class="metronome">

<h2>Tempo</h2>

<div class="bpm">

<span id="tempoValue">60</span>

BPM

</div>

<input
type="range"
min="40"
max="200"
value="60"
id="tempoSlider">

<br>

<button onclick="toggleMetronome()" id="button">

▶ Start

</button>

<div class="tip">

Recommended for beginners:
<strong>60 BPM</strong>

</div>

</div>

<footer>

© Melinda Coles Violin Academy

</footer>

</div>

<script>

let playing=false;
let interval;
let audio;

const slider=document.getElementById("tempoSlider");
const display=document.getElementById("tempoValue");

slider.oninput=function(){

display.innerHTML=this.value;

if(playing){

stopMetronome();

startMetronome();

}

}

function click(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();

const gain=ctx.createGain();

osc.frequency.value=1000;

osc.connect(gain);

gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(

0.00001,

ctx.currentTime+0.05

);

osc.stop(ctx.currentTime+0.05);

}

function startMetronome(){

playing=true;

document.getElementById("button").innerHTML="■ Stop";

const bpm=parseInt(slider.value);

interval=setInterval(click,60000/bpm);

click();

}

function stopMetronome(){

playing=false;

document.getElementById("button").innerHTML="▶ Start";

clearInterval(interval);

}

function toggleMetronome(){

if(playing){

stopMetronome();

}else{

startMetronome();

}

}

</script>

</body>
</html>
